openapi: 3.0.3

info:
  title: Sportshop Categories API
  description: Read-only categories surface for the home page carousel.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Categories
    description: Home-page product categories

paths:
  /api/categories/active:
    get:
      operationId: listActiveCategories
      tags: [Categories]
      summary: List active categories
      description: Returns every category with `is_deleted = FALSE`, ordered alphabetically by name. Public endpoint.
      responses:
        "200":
          description: List of active categories (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

components:
  schemas:
    Category:
      type: object
      required: [id, name, icon]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Soccer
        icon:
          type: string
          maxLength: 500
          nullable: true
          description: Relative URL of the category icon (e.g. `/images/categories/soccer.svg`); `null` if no icon uploaded.
          example: /images/categories/soccer.svg
