openapi: 3.0.3

info:
  title: Sportshop Categories API
  description: Read-only categories surface for the home page carousel.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Categories
    description: Home-page product categories

paths:
  /api/categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: List categories
      description: Returns categories ordered alphabetically by name. Filter with `active` to scope the result set.
      parameters:
        - name: active
          in: query
          required: false
          description: |
            `true` returns non-deleted rows only, `false` returns soft-deleted only,
            omitted returns every row.
          schema:
            type: boolean
          example: true
      responses:
        "200":
          description: List of categories matching the filter (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

components:
  schemas:
    Category:
      type: object
      required: [id, name, icon]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Soccer
        icon:
          type: string
          maxLength: 500
          nullable: true
          description: Absolute URL of the category icon; treat as opaque. `null` if no icon uploaded.
          example: http://localhost:8080/images/categories/soccer.svg
