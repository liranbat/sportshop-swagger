openapi: 3.0.3

info:
  title: Sportshop Stock API
  description: Admin CRUD on `product_stock` rows. Last-writer-wins, except adjust-delta which carries a `quantity + :delta >= 0` safety rail.
  version: 0.1.0

servers:
  - url: http://localhost:8080/api
    description: Local development

tags:
  - name: Admin Stock
    description: Admin CRUD on per-(product, size) stock rows.

paths:
  /admin/stock:
    get:
      operationId: listAdminStock
      tags: [Admin Stock]
      summary: List stock rows (admin)
      description: Paged `(product_id, size)` rows joined with product display fields. Tie-break is `size ASC, products.id ASC`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StockSearchNameParam"
        - $ref: "#/components/parameters/StockSizesParam"
        - $ref: "#/components/parameters/StockStatusParam"
        - $ref: "#/components/parameters/StockArchiveStatusParam"
        - $ref: "#/components/parameters/StockSortFieldParam"
        - $ref: "#/components/parameters/StockSortDirectionParam"
        - $ref: "#/components/parameters/StockPageNumberParam"
        - $ref: "#/components/parameters/StockPageSizeParam"
      responses:
        "200":
          description: Page of stock rows (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockPage"

  /admin/stock/{productId}/{size}:
    put:
      operationId: setAdminStock
      tags: [Admin Stock]
      summary: Set absolute quantity and threshold for one row
      description: |
        Atomic per-row save. Both fields are required; `lowStockThreshold = null` clears the alert. Last-writer-wins.
        - `400` ‚Äî missing field OR negative quantity/threshold.
        - `404` ‚Äî no `product_stock` row for `(productId, size)`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StockProductIdPath"
        - $ref: "#/components/parameters/StockSizePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockSetRequest"
      responses:
        "200":
          description: Row updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockRow"

  /admin/stock/{productId}/{size}/adjust:
    post:
      operationId: adjustAdminStock
      tags: [Admin Stock]
      summary: Adjust quantity by signed delta
      description: |
        Applies `quantity = quantity + :delta` atomically under the row lock, gated by `quantity + :delta >= 0`. Concurrent positive deltas compose.
        - `400` ‚Äî `delta` is zero, missing, or not an integer.
        - `409` ‚Äî row no longer exists OR the rail fired (single message covers both).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StockProductIdPath"
        - $ref: "#/components/parameters/StockSizePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustRequest"
      responses:
        "200":
          description: Row adjusted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockRow"

  /admin/stock/{productId}/sizes:
    post:
      operationId: addAdminStockSize
      tags: [Admin Stock]
      summary: Add a new size to a product
      description: |
        Inserts a new `product_stock` row. Size is free-text; `ONE_SIZE` is reserved for single-size products.
        - `400` ‚Äî blank size, size equals `ONE_SIZE`, negative quantity/threshold, or product has `is_multi_size = false`.
        - `404` ‚Äî product not found.
        - `409` ‚Äî `(productId, size)` already exists.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StockProductIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockSizeAddRequest"
      responses:
        "200":
          description: Size added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockRow"

  /admin/stock/{productId}/sizes/{size}:
    delete:
      operationId: removeAdminStockSize
      tags: [Admin Stock]
      summary: Remove a size from a product
      description: |
        Idempotent ‚Äî second delete is a no-op.
        - `400` ‚Äî product has `is_multi_size = false` OR `size` equals `ONE_SIZE`.
        - `404` ‚Äî product not found.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StockProductIdPath"
        - $ref: "#/components/parameters/StockSizePath"
      responses:
        "204":
          description: Size removed. Empty body.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ACCESS_TOKEN

  parameters:
    StockProductIdPath:
      name: productId
      in: path
      required: true
      description: Target product id.
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1

    StockSizePath:
      name: size
      in: path
      required: true
      description: Target size string (URL-encoded).
      schema:
        type: string
        minLength: 1
        maxLength: 20
      example: "42"

    StockSearchNameParam:
      name: searchName
      in: query
      required: false
      description: Case-insensitive substring match on `products.name`. Trimmed; empty after trim is no filter.
      schema:
        type: string
        minLength: 1
        maxLength: 200
      example: nike

    StockSizesParam:
      name: sizes
      in: query
      required: false
      description: Filter to rows whose size is in the set. Comma-joined (`?sizes=M,L,42`).
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 20
      example: ["M", "L"]

    StockStatusParam:
      name: stockStatus
      in: query
      required: false
      description: |
        Stock-criticality filter. Omit for "no filter".
        - `IN_STOCK` ‚Äî `quantity > low_stock_threshold` (or threshold is null).
        - `LOW_STOCK` ‚Äî `quantity > 0 AND quantity <= low_stock_threshold`.
        - `OUT_OF_STOCK` ‚Äî `quantity = 0`.
      schema:
        $ref: "#/components/schemas/StockStatusFilter"
      example: LOW_STOCK

    StockArchiveStatusParam:
      name: archiveStatus
      in: query
      required: false
      description: Archive-state filter. Omit for "no filter".
      schema:
        $ref: "#/components/schemas/StockArchiveStatusFilter"
      example: ACTIVE

    StockSortFieldParam:
      name: sortField
      in: query
      required: false
      description: Sort column. Defaults to `name`.
      schema:
        type: string
        enum: [name, quantity, threshold]
      example: quantity

    StockSortDirectionParam:
      name: sortDirection
      in: query
      required: false
      description: Sort direction. Defaults to `asc`.
      schema:
        type: string
        enum: [asc, desc]
      example: asc

    StockPageNumberParam:
      name: page
      in: query
      required: false
      description: Zero-based page index.
      schema:
        type: integer
        format: int32
        minimum: 0
      example: 0

    StockPageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Items per page.
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 50

  schemas:
    StockStatusFilter:
      type: string
      enum:
        - IN_STOCK
        - LOW_STOCK
        - OUT_OF_STOCK
      example: LOW_STOCK

    StockArchiveStatusFilter:
      type: string
      enum:
        - ACTIVE
        - ARCHIVED
      example: ACTIVE

    StockRow:
      type: object
      required:
        - productId
        - productName
        - productIsArchived
        - size
        - quantity
      properties:
        productId:
          type: integer
          format: int64
          example: 47
        productName:
          type: string
          example: Nike Ja 3 Basketball Shoes
        productImageUrl:
          type: string
          maxLength: 500
          nullable: true
          description: Absolute URL; treat as opaque. `null` if no image uploaded.
          example: http://localhost:8080/images/products/nike-ja-3.jpg
        productIsArchived:
          type: boolean
          example: false
        productIsMultiSize:
          type: boolean
          description: Gates Add/Remove-size affordances client-side.
          example: true
        size:
          type: string
          maxLength: 20
          description: Free-text. `ONE_SIZE` is reserved for `is_multi_size = false` products.
          example: "42"
        quantity:
          type: integer
          format: int32
          minimum: 0
          example: 18
        lowStockThreshold:
          type: integer
          format: int32
          minimum: 0
          nullable: true
          description: Below-or-equal triggers the low-stock signal; `null` = never alert.
          example: 5

    StockPage:
      type: object
      description: Paged envelope. `page`/`pageSize` echo the request; `totalElements`/`totalPages` describe the full filtered set.
      required: [items, page, pageSize, totalElements, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StockRow"
        page:
          type: integer
          format: int32
          minimum: 0
          example: 0
        pageSize:
          type: integer
          format: int32
          minimum: 1
          example: 50
        totalElements:
          type: integer
          format: int64
          minimum: 0
          example: 137
        totalPages:
          type: integer
          format: int32
          minimum: 0
          example: 3

    StockSetRequest:
      type: object
      required: [quantity]
      description: Row-save body. `quantity` is required; `lowStockThreshold` clears the alert when `null` or omitted.
      properties:
        quantity:
          type: integer
          format: int32
          minimum: 0
          example: 24
        lowStockThreshold:
          type: integer
          format: int32
          minimum: 0
          nullable: true
          description: "`null` clears the alert."
          example: 5

    StockAdjustRequest:
      type: object
      required: [delta]
      properties:
        delta:
          type: integer
          format: int32
          description: Non-zero signed integer. `0` is rejected with 400.
          example: 50

    StockSizeAddRequest:
      type: object
      required: [size, quantity]
      properties:
        size:
          type: string
          minLength: 1
          maxLength: 20
          description: Trimmed server-side; must not equal `ONE_SIZE`.
          example: "42"
        quantity:
          type: integer
          format: int32
          minimum: 0
          example: 10
        lowStockThreshold:
          type: integer
          format: int32
          minimum: 0
          nullable: true
          description: Omit or `null` for "never alert".
          example: 5
