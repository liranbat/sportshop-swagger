openapi: 3.0.3

info:
  title: Sportshop Auth API
  description: |
    Authentication surface used by Sign In, Sign Up, Sign Out, session restore,
    and the `/me` query that drives the LoggedIn / LoggedInAdmin Navbar variants.

    Two HttpOnly Secure SameSite=Lax cookies carry the session:
      - `access_token` -- JWT, short-lived (default 15 minutes, configurable via
        the `SPORTSHOP_ACCESS_TOKEN_TTL` environment variable).
      - `refresh_token` -- opaque, long-lived (default 14 days, configurable via
        the `SPORTSHOP_REFRESH_TOKEN_TTL` environment variable). The single-
        session invariant in project-summary section 3.1 enforces
        `UNIQUE(user_id)` on `refresh_tokens`, so logging in on a new device
        silently expires the previous session.

    Error responses are intentionally NOT documented here -- the backend's
    `GlobalExceptionHandler` produces a uniform error shape for every
    endpoint across the project, so each contract file only describes its
    success path.

    Admin user / session management (Group A) is authored separately and lives
    in an admin-only contract file in a future revision.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Sign up, sign in, sign out, refresh, current-user lookup

paths:
  /api/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new active user row and hashes the password with bcrypt.
        Does NOT auto-sign-in -- no session cookies are issued and no refresh-
        token row is created. The frontend should redirect the user to
        `/sign-in` after a successful response so they re-enter the password
        they just chose (defensive against typos / autofill mistakes).

        Email is unique across active AND soft-deleted users (per project-
        summary section 3.10 "Delete account" -- emails stay reserved after
        soft-delete).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created. No cookies are set; client must call `/auth/login` to start a session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /api/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Sign in with email + password
      description: |
        Verifies the bcrypt hash for `email`, upserts a single refresh-token
        row (per the single-session invariant), and sets both cookies.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Signed in (cookies set).
          headers:
            Set-Cookie:
              description: |
                Two HttpOnly Secure SameSite=Lax cookies:
                  - `access_token` (TTL = `SPORTSHOP_ACCESS_TOKEN_TTL`, default 15m)
                  - `refresh_token` (TTL = `SPORTSHOP_REFRESH_TOKEN_TTL`, default 14d)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /api/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Sign out the current session
      description: |
        Clears both session cookies (`Max-Age=0`) and deletes the matching
        `refresh_tokens` row if one is found. Idempotent -- calling without
        a valid session still returns 204 with cleared cookies.
      security: []
      responses:
        "204":
          description: Session cleared. Both cookies are sent with `Max-Age=0`.
          headers:
            Set-Cookie:
              description: |
                Two HttpOnly Secure SameSite=Lax cookies sent with `Max-Age=0`
                (`access_token` and `refresh_token`), clearing them on the
                browser.
              schema:
                type: string

  /api/auth/refresh:
    post:
      operationId: refresh
      tags: [Auth]
      summary: Rotate the session cookies using the refresh token
      description: |
        Validates the `refresh_token` cookie against the `refresh_tokens` row,
        issues a new access-token cookie, and rotates the refresh-token row.
        Returns the current user payload so the frontend can update local
        session state without a separate `/me` call.
      security:
        - refreshCookieAuth: []
      responses:
        "200":
          description: Refreshed (new cookies set).
          headers:
            Set-Cookie:
              description: |
                Refreshed `access_token` and rotated `refresh_token` cookies
                (HttpOnly Secure SameSite=Lax, same TTLs as login).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /api/auth/me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Current user profile
      description: |
        Drives the Navbar variant (Guest / LoggedIn / LoggedInAdmin) and the
        Profile page on the frontend.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: |
        HttpOnly Secure SameSite=Lax JWT carrying the user id and role claim.
        Set by `/auth/login`, `/auth/register`, and `/auth/refresh`; cleared
        by `/auth/logout`.
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: |
        HttpOnly Secure SameSite=Lax opaque token matched against the unique
        `refresh_tokens` row for the user. Only `/auth/refresh` consumes it.

  schemas:
    RegisterRequest:
      type: object
      required: [firstName, lastName, email, phone, password]
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
          pattern: '^[A-Za-z]+(-[A-Za-z]+)*$'
          description: |
            Latin letters only; an internal hyphen is allowed but the value
            must start and end with a letter (no leading, trailing, or
            consecutive hyphens).
          example: Liran
        lastName:
          type: string
          minLength: 2
          maxLength: 50
          pattern: '^[A-Za-z]+(-[A-Za-z]+)*$'
          description: Same rules as `firstName`.
          example: Bat
        email:
          type: string
          format: email
          maxLength: 254
          example: liran@example.com
        phone:
          type: string
          pattern: '^05\d{8}$'
          description: |
            Israeli mobile in normalized 10-digit form `05XXXXXXXX`. The
            frontend strips user-entered dashes and spaces before submission;
            international (`+972...`) formats are not accepted.
          example: "0521234567"
        password:
          type: string
          minLength: 8
          maxLength: 30
          pattern: '^(?=.*[A-Za-z])(?=.*\d)(?!.*\s).+$'
          description: |
            8-30 characters, must contain at least one letter, at least one
            digit, and no whitespace. Hashed server-side with bcrypt; the
            raw value is never logged or stored.
          example: Password1
          writeOnly: true

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: liran@example.com
        password:
          type: string
          description: |
            Sent as-is to the server, which compares it against the bcrypt
            hash. Intentionally has no length / pattern check here so users
            whose passwords predate a policy change can still sign in.
          example: Password1
          writeOnly: true

    UserResponse:
      type: object
      description: |
        Shared user payload returned by `register`, `login`, `refresh`, and
        `getMe` -- whenever the backend needs to hand a user object back to
        the frontend.
      required: [id, firstName, lastName, email, phone, isAdmin]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        firstName:
          type: string
          example: Liran
        lastName:
          type: string
          example: Bat
        email:
          type: string
          format: email
          example: liran@example.com
        phone:
          type: string
          pattern: '^05\d{8}$'
          example: "0521234567"
        isAdmin:
          type: boolean
          description: |
            Drives the LoggedIn vs LoggedInAdmin Navbar variant and the
            admin-route guards on the frontend.
          example: false
