openapi: 3.0.3

info:
  title: Sportshop Products API
  description: Read-only products surface for the catalog page and product details page.
  version: 0.3.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Products
    description: Catalog products

paths:
  /api/products:
    get:
      operationId: listProducts
      tags: [Products]
      summary: List products
      description: |
        Returns a page of products matching the filter and sort criteria. All filter and sort
        query parameters are optional and combine with AND semantics. The response is an
        envelope (`ProductPage`) with the items array plus pagination metadata.
      parameters:
        - name: active
          in: query
          required: false
          description: |
            `true` returns non-archived rows only, `false` returns archived only,
            omitted returns every row.
          schema:
            type: boolean
          example: true
        - name: search
          in: query
          required: false
          description: Case-insensitive substring match on `name`. Whitespace-trimmed server-side; empty after trim is treated as no filter.
          schema:
            type: string
            minLength: 1
            maxLength: 200
          example: spalding
        - name: categoryIds
          in: query
          required: false
          description: Filter to products whose `categoryId` is in the set. Serialized as comma-joined values (`?categoryIds=1,2,3`).
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
              format: int64
          example: [1, 2]
        - name: priceMin
          in: query
          required: false
          description: Returns products with `price >= priceMin`.
          schema:
            type: number
            minimum: 0
          example: 10.00
        - name: priceMax
          in: query
          required: false
          description: Returns products with `price <= priceMax`. If `priceMax < priceMin`, the request succeeds and returns an empty list.
          schema:
            type: number
            minimum: 0
          example: 100.00
        - name: sortField
          in: query
          required: false
          description: Sort column. When omitted or empty, the backend sorts by `id` ascending (stable insertion order).
          schema:
            type: string
            enum: [name, price, category]
          example: name
        - name: sortDirection
          in: query
          required: false
          description: Sort direction. Ignored unless `sortField` is supplied. Defaults to `asc`.
          schema:
            type: string
            enum: [asc, desc]
          example: asc
        - name: page
          in: query
          required: false
          description: |
            Zero-based page index (the first page is `0`, matching Spring Data JPA's native
            convention). The controller defaults the value when omitted. Pages past the end
            return an empty `items` array with the correct `totalElements` / `totalPages`.
          schema:
            type: integer
            format: int32
            minimum: 0
          example: 0
        - name: pageSize
          in: query
          required: false
          description: |
            Items per page. The UI exposes `[4, 9, 16, 25]`; any positive integer is accepted
            for API parity. The controller defaults the value when omitted.
          schema:
            type: integer
            format: int32
            minimum: 1
          example: 9
      responses:
        "200":
          description: Page of products matching the filter (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"

  /api/products/{id}:
    get:
      operationId: getProduct
      tags: [Products]
      summary: Get product details
      description: |
        Returns the full product detail payload used by the Product Details page:
        the base `Product` fields, the resolved `categoryName`, and a `sizes`
        array describing the product's stock for each size (with a server-computed
        `state` of `IN_STOCK`, `LOW_STOCK`, or `OUT_OF_STOCK`).

        Single-size SKUs (`isMultiSize = false`) return exactly one entry whose
        `size` is `ONE_SIZE`. Multi-size SKUs return one entry per stocked size.

        Returns `404` when the product does not exist or has been archived
        (`is_archived = true`).
      parameters:
        - name: id
          in: path
          required: true
          description: Product identifier (matches `Product.id`).
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 1
      responses:
        "200":
          description: Product detail payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

components:
  schemas:
    Product:
      type: object
      required: [id, name, isMultiSize, price, version]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Spalding NBA Basketball
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Marketing copy for the product detail page; `null` if not authored yet.
          example: Official-size indoor/outdoor basketball with composite leather grip.
        categoryId:
          type: integer
          format: int64
          description: Foreign key to `Category.id`.
          example: 1
        isMultiSize:
          type: boolean
          description: When `true`, the product ships in multiple size variants (e.g. shoes); when `false`, it is a single-size SKU (balls, accessories).
          example: false
        imageUrl:
          type: string
          maxLength: 500
          nullable: true
          description: Absolute URL of the product image; treat as opaque. `null` if no image uploaded.
          example: http://localhost:8080/images/products/basketball-spalding.jpg
        price:
          type: number
          minimum: 0
          description: Price in the store's base currency, with two decimal places.
          example: 29.99
        version:
          type: integer
          format: int32
          description: Optimistic-locking stamp; bumped on every successful update.
          example: 1
    ProductDetail:
      description: |
        Aggregated payload for the Product Details page. Wraps a `Product` with
        the resolved `categoryName` (saves the frontend a second call to
        `/api/categories`) and the per-size stock breakdown.
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            categoryName:
              type: string
              minLength: 1
              maxLength: 100
              description: Display name of the category referenced by `categoryId`.
              example: Basketball Balls
            sizes:
              type: array
              description: Single-size SKUs return one row with `size = "ONE_SIZE"`; multi-size SKUs return one row per stocked size.
              items:
                $ref: "#/components/schemas/ProductSize"
    ProductSize:
      type: object
      description: A single size variant's stock snapshot for a product.
      required: [size, quantity, state]
      properties:
        size:
          type: string
          minLength: 1
          maxLength: 20
          description: Size token (e.g. `"ONE_SIZE"`, `"42"`, `"L"`).
          example: ONE_SIZE
        quantity:
          type: integer
          format: int32
          minimum: 0
          description: Current on-hand quantity for this size.
          example: 25
        state:
          type: string
          description: |
            Server-computed stock state derived from `quantity` and the
            product's `low_stock_threshold`:
              * `OUT_OF_STOCK` when `quantity == 0`.
              * `LOW_STOCK`    when `0 < quantity <= low_stock_threshold`.
              * `IN_STOCK`     otherwise.
          enum: [IN_STOCK, LOW_STOCK, OUT_OF_STOCK]
          example: IN_STOCK
    ProductPage:
      type: object
      description: Paged envelope returned by `GET /api/products`. `page` and `pageSize` echo the request; `totalElements` and `totalPages` describe the full filtered set.
      required: [items, page, pageSize, totalElements, totalPages]
      properties:
        items:
          type: array
          description: Products on the current page (may be empty).
          items:
            $ref: "#/components/schemas/Product"
        page:
          type: integer
          format: int32
          minimum: 0
          description: Zero-based index of the page that was returned.
          example: 0
        pageSize:
          type: integer
          format: int32
          minimum: 1
          description: Number of items the server attempted to return for this page.
          example: 9
        totalElements:
          type: integer
          format: int64
          minimum: 0
          description: Total number of products matching the filter across all pages.
          example: 42
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: Total number of pages at the current `pageSize`. `0` when `totalElements` is `0`.
          example: 5
