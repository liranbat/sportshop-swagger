openapi: 3.0.3

info:
  title: Sportshop Products API
  description: Catalog products for the user-facing catalog/detail pages + admin CRUD on the same resource.
  version: 0.6.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Products
    description: Catalog products
  - name: Admin Products
    description: Admin list of products (includes archived)

paths:
  /api/products:
    get:
      operationId: listProducts
      tags: [Products]
      summary: List active products
      description: |
        Returns a page of non-archived products matching the filter and sort criteria. All filter
        and sort query parameters are optional and combine with AND semantics. The response is an
        envelope (`ProductPage`) with the items array plus pagination metadata.
      parameters:
        - $ref: "#/components/parameters/ProductSearchFilter"
        - $ref: "#/components/parameters/ProductCategoryIdsFilter"
        - $ref: "#/components/parameters/ProductPriceMinFilter"
        - $ref: "#/components/parameters/ProductPriceMaxFilter"
        - $ref: "#/components/parameters/ProductSortField"
        - $ref: "#/components/parameters/ProductSortDirection"
        - $ref: "#/components/parameters/ProductPageNumber"
        - $ref: "#/components/parameters/ProductPageSize"
      responses:
        "200":
          description: Page of products matching the filter (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"

  /api/products/{id}:
    get:
      operationId: getProduct
      tags: [Products]
      summary: Get product details
      description: |
        Returns the full product detail payload used by the Product Details page:
        the base `Product` fields, the resolved `categoryName`, and a `sizes`
        array describing the product's stock for each size (with a server-computed
        `state` of `IN_STOCK`, `LOW_STOCK`, or `OUT_OF_STOCK`).

        Single-size SKUs (`isMultiSize = false`) return exactly one entry whose
        `size` is `ONE_SIZE`. Multi-size SKUs return one entry per stocked size.

        Archived products are returned only to admins (with `isArchived = true`)
        so they can land on the admin detail page directly. Non-admin callers
        (including anonymous) get `404` for archived products — same response
        shape as a non-existent id.
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      responses:
        "200":
          description: Product detail payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

  /api/admin/products:
    get:
      operationId: listAdminProducts
      tags: [Admin Products]
      summary: List all products (admin)
      description: |
        Returns a page of products including archived. Use `archiveStatus=ACTIVE|ARCHIVED` to
        narrow; omit the param to return both. `id asc` is appended to every emitted ORDER BY
        as a deterministic tie-break.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductArchiveStatusFilterParam"
        - $ref: "#/components/parameters/ProductSearchFilter"
        - $ref: "#/components/parameters/ProductCategoryIdsFilter"
        - $ref: "#/components/parameters/ProductPriceMinFilter"
        - $ref: "#/components/parameters/ProductPriceMaxFilter"
        - $ref: "#/components/parameters/AdminProductSortField"
        - $ref: "#/components/parameters/ProductSortDirection"
        - $ref: "#/components/parameters/ProductPageNumber"
        - $ref: "#/components/parameters/ProductPageSize"
      responses:
        "200":
          description: Page of products (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
    post:
      operationId: createAdminProduct
      tags: [Admin Products]
      summary: Create a product
      description: |
        Inserts a product and its initial `product_stock` rows in one transaction. Returns the full
        `ProductDetail` so the post-create redirect can render without a second round-trip.
        - `400` — validation (negative quantity, multi-size key rules, bad `imageUrl` prefix, unknown `categoryId`).
        - `409` — `categoryId` was soft-deleted between picker load and save.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "200":
          description: Product created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

  /api/admin/products/{id}:
    put:
      operationId: updateAdminProduct
      tags: [Admin Products]
      summary: Update a product
      description: |
        Updates editable fields. Optimistic-locked on `version`. Flipping `isMultiSize` cascades
        `product_stock` in the same transaction (wipe all; insert one `ONE_SIZE` row at qty 0 when the
        new value is `false`).
        - `400` — validation (bad `imageUrl`, missing required field).
        - `404` — product not found.
        - `409` — version mismatch OR `categoryId` was soft-deleted between load and save.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          description: Product updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

  /api/admin/products/{id}/archive:
    post:
      operationId: archiveAdminProduct
      tags: [Admin Products]
      summary: Archive a product
      description: |
        Hides the product from the user-facing catalog/detail surfaces (admin-only listing still shows
        it). Optimistic-locked: the UPDATE matches only when `is_archived = FALSE AND version =
        :loaded_version`. The `version` is bumped so live carts re-validate at checkout.
        - `404` — no product with this id.
        - `409` — already archived OR version mismatch.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductLifecycleRequest"
      responses:
        "200":
          description: Product archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

  /api/admin/products/{id}/restore:
    post:
      operationId: restoreAdminProduct
      tags: [Admin Products]
      summary: Restore an archived product
      description: |
        Unarchives the product; it reappears on user-facing surfaces. Optimistic-locked: the UPDATE
        matches only when `is_archived = TRUE AND version = :loaded_version`. The `version` is bumped.
        - `404` — no product with this id.
        - `409` — already active OR version mismatch.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductLifecycleRequest"
      responses:
        "200":
          description: Product restored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ACCESS_TOKEN

  parameters:
    ProductIdPath:
      name: id
      in: path
      required: true
      description: Product identifier (matches `Product.id`).
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1

    ProductSearchFilter:
      name: search
      in: query
      required: false
      description: Case-insensitive substring match on `name`. Whitespace-trimmed server-side; empty after trim is treated as no filter.
      schema:
        type: string
        minLength: 1
        maxLength: 200
      example: spalding

    ProductCategoryIdsFilter:
      name: categoryIds
      in: query
      required: false
      description: Filter to products whose `categoryId` is in the set. Serialized as comma-joined values (`?categoryIds=1,2,3`).
      style: form
      explode: false
      schema:
        type: array
        items:
          type: integer
          format: int64
      example: [1, 2]

    ProductPriceMinFilter:
      name: priceMin
      in: query
      required: false
      description: Returns products with `price >= priceMin`.
      schema:
        type: number
        minimum: 0
      example: 10.00

    ProductPriceMaxFilter:
      name: priceMax
      in: query
      required: false
      description: Returns products with `price <= priceMax`. If `priceMax < priceMin`, the request succeeds and returns an empty list.
      schema:
        type: number
        minimum: 0
      example: 100.00

    ProductSortField:
      name: sortField
      in: query
      required: false
      description: Sort column. When omitted the server sorts by `id` ascending.
      schema:
        type: string
        enum: [name, price, category]
      example: name

    AdminProductSortField:
      name: sortField
      in: query
      required: false
      description: Sort column. When omitted the server sorts by `id` ascending.
      schema:
        type: string
        enum: [name, price, category, updatedAt]
      example: updatedAt

    ProductSortDirection:
      name: sortDirection
      in: query
      required: false
      description: Sort direction. Ignored unless `sortField` is supplied. Defaults to `asc`.
      schema:
        type: string
        enum: [asc, desc]
      example: asc

    ProductPageNumber:
      name: page
      in: query
      required: false
      description: Zero-based page index. The controller defaults the value when omitted.
      schema:
        type: integer
        format: int32
        minimum: 0
      example: 0

    ProductPageSize:
      name: pageSize
      in: query
      required: false
      description: Items per page. The UI exposes `[4, 9, 16, 25]`; any positive integer is accepted. The controller defaults the value when omitted.
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 9

    ProductArchiveStatusFilterParam:
      name: archiveStatus
      in: query
      required: false
      description: Archive-state filter. Omit the param entirely for "no archive filter" (the UI's "All" sentinel) — both active and archived products are returned.
      schema:
        $ref: "#/components/schemas/ProductArchiveStatusFilter"
      example: ACTIVE

  schemas:
    Product:
      type: object
      required: [id, name, isMultiSize, price, version, isArchived]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Spalding NBA Basketball
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Marketing copy for the product detail page; `null` if not authored yet.
          example: Official-size indoor/outdoor basketball with composite leather grip.
        categoryId:
          type: integer
          format: int64
          description: Foreign key to `Category.id`.
          example: 1
        isMultiSize:
          type: boolean
          description: When `true`, the product ships in multiple size variants (e.g. shoes); when `false`, it is a single-size SKU (balls, accessories).
          example: false
        imageUrl:
          type: string
          maxLength: 500
          nullable: true
          description: Absolute URL of the product image; treat as opaque. `null` if no image uploaded.
          example: http://localhost:8080/images/products/basketball-spalding.jpg
        price:
          type: number
          minimum: 0
          description: Price in the store's base currency, with two decimal places.
          example: 29.99
        version:
          type: integer
          format: int32
          description: Optimistic-locking stamp; bumped on every successful update.
          example: 1
        isArchived:
          type: boolean
          description: |
            `true` when the product has been archived. Hidden from non-admin surfaces — `/api/products`
            (list) excludes archived rows, and `/api/products/{id}` (detail) returns `404` for archived
            products when the caller is not an admin. Admins see archived products via
            `/api/admin/products` and via the same `/api/products/{id}` path.
          example: false
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Last-update timestamp. `null` until the first update after creation.
          example: 2026-06-23T15:42:11+03:00
        updatedBy:
          type: integer
          format: int64
          nullable: true
          description: Id of the admin who last updated this product. `null` until the first update after creation.
          example: 1
        archivedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp at which the product was archived. `null` while `isArchived = false`.
          example: 2026-06-23T15:42:11+03:00
        archivedBy:
          type: integer
          format: int64
          nullable: true
          description: Id of the admin who archived this product. `null` while `isArchived = false`.
          example: 1
    ProductArchiveStatusFilter:
      type: string
      description: Archive-state filter for the admin product list. Omit the param entirely for "no archive filter" (the UI's "All" sentinel) — both active and archived products are returned.
      enum:
        - ACTIVE
        - ARCHIVED
      example: ACTIVE
    ProductDetail:
      description: |
        Aggregated payload for the Product Details page. Wraps a `Product` with
        the resolved `categoryName` (saves the frontend a second call to
        `/api/categories`) and the per-size stock breakdown.
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            categoryName:
              type: string
              minLength: 1
              maxLength: 100
              description: Display name of the category referenced by `categoryId`.
              example: Basketball Balls
            sizes:
              type: array
              description: Single-size SKUs return one row with `size = "ONE_SIZE"`; multi-size SKUs return one row per stocked size.
              items:
                $ref: "#/components/schemas/ProductSize"
    ProductSize:
      type: object
      description: A single size variant's stock snapshot for a product.
      required: [size, quantity, state]
      properties:
        size:
          type: string
          minLength: 1
          maxLength: 20
          description: Size token (e.g. `"ONE_SIZE"`, `"42"`, `"L"`).
          example: ONE_SIZE
        quantity:
          type: integer
          format: int32
          minimum: 0
          description: Current on-hand quantity for this size.
          example: 25
        state:
          type: string
          description: |
            Server-computed stock state derived from `quantity` and the
            product's `low_stock_threshold`:
              * `OUT_OF_STOCK` when `quantity == 0`.
              * `LOW_STOCK`    when `0 < quantity <= low_stock_threshold`.
              * `IN_STOCK`     otherwise.
          enum: [IN_STOCK, LOW_STOCK, OUT_OF_STOCK]
          example: IN_STOCK
    ProductCreateRequest:
      type: object
      description: Request body for `POST /api/admin/products`.
      required: [name, categoryId, isMultiSize, price, stockBySize]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Spalding NBA Basketball
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Marketing copy. `null` clears the field.
          example: Official-size indoor/outdoor basketball with composite leather grip.
        categoryId:
          type: integer
          format: int64
          minimum: 1
          description: FK to an active (non-deleted) `Category.id`.
          example: 1
        isMultiSize:
          type: boolean
          description: |
            `false` → `stockBySize` MUST be exactly one entry keyed `"ONE_SIZE"`.
            `true` → `stockBySize` MUST be ≥1 entries and MUST NOT use `"ONE_SIZE"`.
          example: false
        imageUrl:
          type: string
          maxLength: 500
          nullable: true
          description: Absolute URL from `POST /api/admin/images/products`. `null` leaves no image.
          example: http://localhost:8080/images/products/3d6f6c1a-4f15-4e60-9a3a-4b8b6c8c1a2e.jpg
        price:
          type: number
          minimum: 0
          description: Two decimal places.
          example: 29.99
        stockBySize:
          type: object
          minProperties: 1
          additionalProperties:
            $ref: "#/components/schemas/ProductStockEntry"
          description: Initial per-size stock rows; one `product_stock` row per entry.
          example:
            ONE_SIZE:
              quantity: 25
              lowStockThreshold: 5
    ProductUpdateRequest:
      type: object
      description: Body for `PUT /api/admin/products/{id}`. Stock cascade on `isMultiSize` flip is described on the endpoint.
      required: [name, categoryId, isMultiSize, price, version]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Spalding NBA Basketball
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Marketing copy. `null` clears the field.
          example: Official-size indoor/outdoor basketball with composite leather grip.
        categoryId:
          type: integer
          format: int64
          minimum: 1
          description: FK to an active (non-deleted) `Category.id`.
          example: 1
        isMultiSize:
          type: boolean
          description: |
            Flipping this resets `product_stock` for the product in the same transaction. See the
            endpoint description for the cascade rules.
          example: false
        imageUrl:
          type: string
          maxLength: 500
          nullable: true
          description: Absolute URL from `POST /api/admin/images/products`. `null` leaves no image.
          example: http://localhost:8080/images/products/3d6f6c1a-4f15-4e60-9a3a-4b8b6c8c1a2e.jpg
        price:
          type: number
          minimum: 0
          description: Two decimal places.
          example: 29.99
        version:
          type: integer
          format: int32
          minimum: 1
          description: The `version` the client loaded; mismatch on commit yields `409`.
          example: 3
    ProductLifecycleRequest:
      type: object
      description: |
        Request body for archive/restore endpoints. Only the `version` the client loaded is needed;
        the action itself is implied by the path segment.
      required: [version]
      properties:
        version:
          type: integer
          format: int32
          minimum: 1
          description: The `version` the client loaded; mismatch on commit yields `409`.
          example: 3
    ProductStockEntry:
      type: object
      description: Per-size stock row at create time.
      required: [quantity]
      properties:
        quantity:
          type: integer
          format: int32
          minimum: 0
          description: Initial on-hand quantity; `0` allowed.
          example: 25
        lowStockThreshold:
          type: integer
          format: int32
          minimum: 0
          nullable: true
          description: Low-stock when `quantity <= lowStockThreshold`; `null` opts out.
          example: 5
    ProductPage:
      type: object
      description: Paged envelope returned by `GET /api/products`. `page` and `pageSize` echo the request; `totalElements` and `totalPages` describe the full filtered set.
      required: [items, page, pageSize, totalElements, totalPages]
      properties:
        items:
          type: array
          description: Products on the current page (may be empty).
          items:
            $ref: "#/components/schemas/Product"
        page:
          type: integer
          format: int32
          minimum: 0
          description: Zero-based index of the page that was returned.
          example: 0
        pageSize:
          type: integer
          format: int32
          minimum: 1
          description: Number of items the server attempted to return for this page.
          example: 9
        totalElements:
          type: integer
          format: int64
          minimum: 0
          description: Total number of products matching the filter across all pages.
          example: 42
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: Total number of pages at the current `pageSize`. `0` when `totalElements` is `0`.
          example: 5
