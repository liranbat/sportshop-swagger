openapi: 3.0.3

info:
  title: Sportshop Orders API
  description: Read the caller's order history, read a single order's detail, and cancel a PAID order. Every user-facing endpoint is scoped to the authenticated caller; non-owner reads return `404`. Admin operations live under `/api/admin/orders/*` and require the `ADMIN` role -- list any user's orders (with customer search), read any order's detail (with customer info), cancel from `{PAID, SHIPPED, DELIVERED}`, transition status within the fulfillment trio (and one-way to `DONE`), and edit the shipping address with optimistic concurrency anchored on `updated_at`.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Orders
    description: Order history, order detail, user-initiated cancellation.
  - name: Admin Orders
    description: Admin operations on orders -- list (with customer search), view, cancel, update fulfillment status, edit shipping address. All endpoints require the `ADMIN` role.

security:
  - cookieAuth: []

paths:
  /api/orders:
    get:
      operationId: listOrders
      tags: [Orders]
      summary: List the caller's orders
      description: Returns a page of the caller's orders, filtered and sorted per the query parameters. All filter / sort parameters are optional and combine with AND semantics.
      parameters:
        - $ref: "#/components/parameters/OrderStatusFilter"
        - $ref: "#/components/parameters/OrderNumberFilter"
        - $ref: "#/components/parameters/OrderAmountMinFilter"
        - $ref: "#/components/parameters/OrderAmountMaxFilter"
        - $ref: "#/components/parameters/OrderDateFromFilter"
        - $ref: "#/components/parameters/OrderDateToFilter"
        - $ref: "#/components/parameters/OrderSortField"
        - $ref: "#/components/parameters/OrderSortDirection"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Page of orders matching the filter (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListPage"

  /api/orders/{orderNumber}:
    get:
      operationId: getOrder
      tags: [Orders]
      summary: Get an order's full detail
      description: Returns the order header, line items, shipping address, and payment row. Returns `404` when the order does not exist or belongs to a different user.
      parameters:
        - $ref: "#/components/parameters/OrderNumberPath"
      responses:
        "200":
          description: Order detail payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /api/orders/{orderNumber}/cancel:
    post:
      operationId: cancelOrder
      tags: [Orders]
      summary: Cancel a PAID order
      description: |
        Cancels a `PAID` order owned by the caller. Atomically flips the order to `CANCELLED_BY_USER`, restores stock for every line, and marks the payment `REFUNDED`. Empty body; caller refetches `GET /api/orders/{orderNumber}` to render the new state.

        Responses:
          * `204` -- order cancelled.
          * `404` -- order not found or belongs to another user.
          * `409` -- order found but no longer cancellable.
      parameters:
        - $ref: "#/components/parameters/OrderNumberPath"
      responses:
        "204":
          description: Order cancelled. Empty body.

  /api/admin/orders:
    get:
      operationId: listAdminOrders
      tags: [Admin Orders]
      summary: List any user's orders (admin)
      description: Returns a page of all orders matching the filter / sort parameters, regardless of owning user. The acting admin's own orders are included. All filter / sort parameters are optional and combine with AND semantics. A universal `id ASC` tie-breaker is applied after the primary sort.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderStatusFilter"
        - $ref: "#/components/parameters/OrderNumberFilter"
        - $ref: "#/components/parameters/OrderCustomerFilter"
        - $ref: "#/components/parameters/OrderAmountMinFilter"
        - $ref: "#/components/parameters/OrderAmountMaxFilter"
        - $ref: "#/components/parameters/OrderDateFromFilter"
        - $ref: "#/components/parameters/OrderDateToFilter"
        - $ref: "#/components/parameters/OrderSortField"
        - $ref: "#/components/parameters/OrderSortDirection"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Page of orders matching the filter (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListPage"

  /api/admin/orders/{orderNumber}:
    get:
      operationId: getAdminOrder
      tags: [Admin Orders]
      summary: Get any order's full detail (admin)
      description: Returns the order header, line items, shipping address, payment row, and the owning customer's identity — regardless of who placed the order. Returns `404` only when the order number does not exist; cross-user reads are permitted.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderNumberPath"
      responses:
        "200":
          description: Order detail payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /api/admin/orders/{orderNumber}/cancel:
    post:
      operationId: cancelAdminOrder
      tags: [Admin Orders]
      summary: Cancel any order (admin)
      description: |
        Cancels any order in `{PAID, SHIPPED, DELIVERED}` regardless of owning user. Atomically flips the order to `CANCELLED_BY_ADMIN`, restores stock for every line, and marks the payment `REFUNDED`. Empty body; caller refetches `GET /api/admin/orders/{orderNumber}` to render the new state.

        Attribution: the acting admin is recorded on `updated_by` / `updated_at` and on `cancelled_by`; the `status` value (`CANCELLED_BY_ADMIN` vs. `CANCELLED_BY_USER`) is what distinguishes the initiator.

        Responses:
          * `204` -- order cancelled.
          * `404` -- order does not exist.
          * `409` -- order found but no longer cancellable (already cancelled, already `DONE`, etc.).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderNumberPath"
      responses:
        "204":
          description: Order cancelled. Empty body.

  /api/admin/orders/{orderNumber}/update-status:
    post:
      operationId: updateAdminOrderStatus
      tags: [Admin Orders]
      summary: Change an order's fulfillment status (admin)
      description: |
        Atomically moves an order along the lifecycle state machine: `PAID` ↔ `SHIPPED` ↔ `DELIVERED`, plus the skip `PAID` ↔ `DELIVERED` and one-way `→ DONE` from any of `PAID` / `SHIPPED` / `DELIVERED`. No transitions out of `DONE` / `CANCELLED_*`, no self-loops. `priorStatus` is the optimistic-concurrency anchor; the SQL UPDATE matches `WHERE status = :priorStatus`. Empty body; caller refetches `GET /api/admin/orders/{orderNumber}`.

        Attribution: the acting admin is recorded on `updated_by` / `updated_at`.

        Responses:
          * `204` -- status updated.
          * `400` -- `priorStatus → targetStatus` is not a legal transition.
          * `404` -- order does not exist.
          * `409` -- current status no longer matches `priorStatus` (raced).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderNumberPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "204":
          description: Status updated. Empty body.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: HttpOnly Secure SameSite=Lax JWT.

  parameters:
    OrderNumberPath:
      name: orderNumber
      in: path
      required: true
      description: 23-char order number in `ORD-YYYYMMDD-XXXXXXXXXX` format.
      schema:
        type: string
        minLength: 23
        maxLength: 23
        pattern: "^ORD-\\d{8}-[A-Z0-9]{10}$"
      example: ORD-20260612-A1B2C3D4E5

    OrderStatusFilter:
      name: status
      in: query
      required: false
      description: Filter to orders whose `status` matches exactly.
      schema:
        $ref: "#/components/schemas/OrderStatus"
      example: PAID

    OrderNumberFilter:
      name: orderNumber
      in: query
      required: false
      description: Case-insensitive substring match against `order_number`.
      schema:
        type: string
        minLength: 1
        maxLength: 23
      example: "20260612"

    OrderAmountMinFilter:
      name: amountMin
      in: query
      required: false
      description: Returns orders with `totalPrice >= amountMin`.
      schema:
        type: number
        minimum: 0
      example: 50.00

    OrderAmountMaxFilter:
      name: amountMax
      in: query
      required: false
      description: Returns orders with `totalPrice <= amountMax`.
      schema:
        type: number
        minimum: 0
      example: 500.00

    OrderDateFromFilter:
      name: dateFrom
      in: query
      required: false
      description: Returns orders with `createdAt >= dateFrom` (inclusive, ISO date `YYYY-MM-DD`).
      schema:
        type: string
        format: date
      example: "2026-04-01"

    OrderDateToFilter:
      name: dateTo
      in: query
      required: false
      description: Returns orders with `createdAt <= dateTo` (inclusive, ISO date `YYYY-MM-DD`).
      schema:
        type: string
        format: date
      example: "2026-04-30"

    OrderSortField:
      name: sortField
      in: query
      required: false
      description: Sort column. When omitted the server sorts by `createdAt` descending.
      schema:
        type: string
        enum: [date, total]
      example: date

    OrderSortDirection:
      name: sortDirection
      in: query
      required: false
      description: Sort direction. Defaults to `desc`.
      schema:
        type: string
        enum: [asc, desc]
      example: desc

    PageNumber:
      name: page
      in: query
      required: false
      description: Zero-based page index.
      schema:
        type: integer
        format: int32
        minimum: 0
      example: 0

    PageSize:
      name: pageSize
      in: query
      required: false
      description: Items per page.
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 10

    OrderCustomerFilter:
      name: customer
      in: query
      required: false
      description: Case-insensitive substring match against the owning user's `firstName`, `lastName`, `email`, and the concatenated `firstName lastName` / `lastName firstName`, so a query like `Liran Bat` finds the user. Trimmed; empty after trim is ignored.
      schema:
        type: string
        maxLength: 200
      example: jane

  schemas:
    OrderStatus:
      type: string
      description: Order lifecycle status.
      enum:
        - PAID
        - CANCELLED_BY_USER
        - CANCELLED_BY_ADMIN
        - SHIPPED
        - DELIVERED
        - DONE
      example: PAID

    PaymentStatus:
      type: string
      description: Payment lifecycle status.
      enum: [SUCCESS, REFUNDED]
      example: SUCCESS

    UpdateOrderStatusRequest:
      type: object
      description: Body for `POST /api/admin/orders/{orderNumber}/update-status`. `priorStatus` is the status the client observed when opening the modal and is used as the optimistic-concurrency anchor.
      required: [targetStatus, priorStatus]
      properties:
        targetStatus:
          $ref: "#/components/schemas/OrderStatus"
        priorStatus:
          $ref: "#/components/schemas/OrderStatus"

    OrderSummary:
      type: object
      description: One row on the Order History list.
      required:
        - orderNumber
        - status
        - createdAt
        - itemCount
        - totalPrice
        - customer
      properties:
        orderNumber:
          type: string
          minLength: 23
          maxLength: 23
          pattern: "^ORD-\\d{8}-[A-Z0-9]{10}$"
          example: ORD-20260612-A1B2C3D4E5
        status:
          $ref: "#/components/schemas/OrderStatus"
        createdAt:
          type: string
          format: date-time
          description: When the order was placed (UTC).
          example: "2026-04-12T14:32:00Z"
        itemCount:
          type: integer
          format: int32
          minimum: 1
          description: Number of distinct line items in the order.
          example: 3
        totalPrice:
          type: number
          minimum: 0
          description: Sum of the order's line totals.
          example: 419.00
        customer:
          $ref: "#/components/schemas/CustomerForOrder"

    OrderListPage:
      type: object
      description: Paged envelope returned by `GET /api/orders`.
      required: [items, page, pageSize, totalElements, totalPages]
      properties:
        items:
          type: array
          description: Orders on the current page (may be empty).
          items:
            $ref: "#/components/schemas/OrderSummary"
        page:
          type: integer
          format: int32
          minimum: 0
          description: Zero-based index of the returned page.
          example: 0
        pageSize:
          type: integer
          format: int32
          minimum: 1
          description: Items per page that the server attempted to return.
          example: 10
        totalElements:
          type: integer
          format: int64
          minimum: 0
          description: Total orders matching the filter across all pages.
          example: 23
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: Total pages at the current `pageSize`.
          example: 3

    CustomerForOrder:
      type: object
      description: Owning user's identity.
      required: [id, firstName, lastName, email]
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        firstName:
          type: string
          example: Liran
        lastName:
          type: string
          example: Bat
        email:
          type: string
          format: email
          example: liran.bat@example.com

    OrderItem:
      type: object
      description: One line item on the order, taken from the snapshot saved at checkout time.
      required:
        - productId
        - productName
        - size
        - quantity
        - pricePerUnit
        - lineTotal
      properties:
        productId:
          type: integer
          format: int64
          minimum: 1
          description: Identifier of the product at order time.
          example: 1
        productName:
          type: string
          minLength: 1
          maxLength: 200
          description: Product name at order time.
          example: Spalding NBA Basketball
        productImageUrl:
          type: string
          maxLength: 500
          nullable: true
          description: Product image URL at order time; `null` when no image was attached.
          example: /images/products/basketball-spalding.jpg
        size:
          type: string
          minLength: 1
          maxLength: 20
          description: Size token the user selected.
          example: ONE_SIZE
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Quantity purchased on this line.
          example: 2
        pricePerUnit:
          type: number
          minimum: 0
          description: Product unit price at order time.
          example: 29.99
        lineTotal:
          type: number
          minimum: 0
          description: "`pricePerUnit * quantity`."
          example: 59.98

    OrderShipping:
      type: object
      description: Shipping address captured at checkout.
      required: [fullName, email, phone, country, city, addressLine]
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Doe
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 254
          example: jane.doe@example.com
        phone:
          type: string
          minLength: 10
          maxLength: 10
          pattern: "^05\\d{8}$"
          example: "0521234567"
        country:
          type: string
          minLength: 1
          maxLength: 100
          example: Israel
        city:
          type: string
          minLength: 1
          maxLength: 100
          example: Tel Aviv
        addressLine:
          type: string
          minLength: 1
          maxLength: 200
          example: 12 Allenby St, Apt 4

    OrderPayment:
      type: object
      description: Payment row associated with the order.
      required:
        - provider
        - transactionId
        - amount
        - currency
        - status
        - processedAt
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 32
          description: Payment provider identifier.
          example: MOCK_CARD
        transactionId:
          type: string
          minLength: 1
          maxLength: 100
          description: Provider transaction id.
          example: txn_abc123
        amount:
          type: number
          minimum: 0
          description: Amount paid.
          example: 419.00
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: ISO 4217 currency code.
          example: USD
        status:
          $ref: "#/components/schemas/PaymentStatus"
        processedAt:
          type: string
          format: date-time
          description: When the payment was first persisted (UTC).
          example: "2026-04-12T14:32:00Z"
        refundedAt:
          type: string
          format: date-time
          nullable: true
          description: When the payment was refunded (UTC); `null` when `status != REFUNDED`.
          example: "2026-04-15T10:04:00Z"

    OrderDetail:
      type: object
      description: Full detail view of a single order.
      required:
        - orderNumber
        - status
        - createdAt
        - totalPrice
        - itemCount
        - items
        - shipping
        - payment
        - customer
      properties:
        orderNumber:
          type: string
          minLength: 23
          maxLength: 23
          pattern: "^ORD-\\d{8}-[A-Z0-9]{10}$"
          example: ORD-20260612-A1B2C3D4E5
        status:
          $ref: "#/components/schemas/OrderStatus"
        createdAt:
          type: string
          format: date-time
          description: When the order was placed (UTC).
          example: "2026-04-12T14:32:00Z"
        cancelledAt:
          type: string
          format: date-time
          nullable: true
          description: When the order was cancelled (UTC); `null` when not cancelled.
          example: "2026-04-15T10:04:00Z"
        totalPrice:
          type: number
          minimum: 0
          description: Order total.
          example: 419.00
        itemCount:
          type: integer
          format: int32
          minimum: 1
          description: Number of distinct line items.
          example: 3
        items:
          type: array
          minItems: 1
          description: Line items on the order.
          items:
            $ref: "#/components/schemas/OrderItem"
        shipping:
          $ref: "#/components/schemas/OrderShipping"
        payment:
          $ref: "#/components/schemas/OrderPayment"
        customer:
          $ref: "#/components/schemas/CustomerForOrder"
